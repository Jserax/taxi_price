version: '3.8'
services:  

    postgresql:
        restart: always
        image: postgres:13
        container_name: postgres
        environment:
            - POSTGRES_DB=postgres
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
        ports:
            - "5434:5432" 
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - postgres       



    mlflow:
        image: skyraxer/mlflow:latest
        container_name: mlflow
        ports:
            - "5000:5000"
        command: mlflow server -w 1 --backend-store-uri postgresql://postgres:postgres@postgresql/postgres --default-artifact-root /mlartifacts --host 0.0.0.0      
        volumes:
            - "/root/taxi_price/src/docker/docker-mlflow/mlartifacts:/root/mlartifacts"
        networks:
            - postgres 
        depends_on:
            - postgresql


    airflow:
        image: skyraxer/airflow:latest
        container_name: airflow
        ports:
            - '8088:8080'
        expose:
            - '8793'
        networks:
            - postgres
        environment:
            - TZ=Europe/Moscow
            - AIRFLOW__CORE__LOAD_EXAMPLES=False      
        volumes:
            - "/root/taxi_price/src/docker/docker-airflow/dags:/root/airflow/dags" 
            - "/root/taxi_price/src/docker/docker-mlflow/mlartifacts:/root/mlartifacts"
            - "/var/run/docker.sock:/var/run/docker.sock"
        command: 
            - /bin/bash
            - -c
            - |
              airflow db init
              airflow users create -r Admin -u admin -f admin -l admin -e admin@airflow.org -p admin
              airflow scheduler -D &
              airflow webserver -w 1 
        depends_on:
            - postgresql  
        
    db_init:
        image: skyraxer/db_init:latest
        container_name: db-init
        command: python3 main.py
        environment:
            - TABLE_DAY=value
        networks:
            - postgres 
        depends_on:
            - postgresql

networks:
  postgres:
    driver: bridge
volumes:
    postgres_data:  
    